name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          cd omx-core
          python -m pip install --upgrade pip
          pip install -e ".[analyze]"
          pip install pytest
      - name: Test
        run: |
          cd omx-core
          python -m pytest -q
